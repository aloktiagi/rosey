# SaaS router deploy on Fly. Customize the app name with
# `fly launch --no-deploy --copy-config --name <your-router-name>`.
# See https://fly.io/docs/reference/configuration/

app = 'rosey-router'
primary_region = 'sjc'

[build]

[env]
  DATABASE_URL = 'sqlite:////data/router.db'
  ROSEY_FLY_ORG = 'personal'
  ROSEY_FLY_REGION = 'sjc'
  ROSEY_HOUSEHOLD_CONFIG = '/app/router/household_template.fly.toml'
  ROSEY_TEMPLATE_APP = 'rosey-template'

[[mounts]]
  source = 'router_data'
  destination = '/data'

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
