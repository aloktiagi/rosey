# Bundled into the router image; passed via `fly deploy --config` when
# spinning up a new household VM. The `app` field is overridden by the
# `-a <name>` flag, so the value here is just a placeholder.

app = "rosey-household-template"
primary_region = "sjc"

[env]
  MEMORY_ROOT = "/data/memories"
  ROSEY_ENABLE_SCHEDULER = "1"
  # Default timezone for households that didn't pick one during onboarding
  # (v1 flow, or v2 with the user-typed tz unresolvable). v2 onboarding
  # injects a per-household SCHEDULER_TZ Fly secret which overrides this.
  SCHEDULER_TZ = "America/Los_Angeles"

[[mounts]]
  source = "memory_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
