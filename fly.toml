# Single-tenant Rosey deploy on Fly.
# See https://fly.io/docs/reference/configuration/

app = 'rosey'
primary_region = 'sjc'

[build]

# Non-secret runtime config. Secrets (ANTHROPIC_API_KEY, TELEGRAM_BOT_TOKEN,
# TELEGRAM_WEBHOOK_URL, TELEGRAM_WEBHOOK_SECRET, optionally OPENAI_API_KEY)
# go through `fly secrets set` instead — they're encrypted at rest.
[env]
  MEMORY_ROOT = '/data/memories'
  SCHEDULER_TZ = 'America/Los_Angeles'

[[mounts]]
  source = 'memory_data'
  destination = '/data'

# Webhook listener + health check.
#
# We use a single [[services]] block (not [http_service]) because
# [http_service] implicitly adds an HTTP GET / health check, and the bot's
# tornado webhook server only serves /telegram — every other path returns
# 404 and the implicit check would fail forever. Defining the service
# explicitly lets us use a TCP-only check that just verifies port 8080 is
# listening (which it can only do if the bot started successfully).
[[services]]
  protocol = 'tcp'
  internal_port = 8080
  auto_stop_machines = 'off'   # reminders need a live process
  auto_start_machines = true
  min_machines_running = 1

  # External 80 → redirect to HTTPS; 443 → terminate TLS, forward plain
  # HTTP to internal_port 8080.
  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.tcp_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
